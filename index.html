<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEILOG - Consulta Rápida</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --heineken-green: #00904A; --dark-bg: #174017; }
    body { font-family: 'Roboto', sans-serif; background-color: var(--dark-bg); color: #f3f4f6; }
    .font-title { font-family: 'Oswald', sans-serif; }
    .card { background-color: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .form-input { background-color: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: white; }
    .form-input:focus { border-color: var(--heineken-green); outline: none; }
    .btn-green { background-color: var(--heineken-green); color: white; font-weight: bold; }
    .address-box { background: rgba(255,255,255,0.05); border-left: 4px solid var(--heineken-green); padding: 12px; margin-top: 12px; border-radius: 4px; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
  </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center p-4 sm:p-8">

  <div class="w-full max-w-2xl card rounded-2xl p-6 sm:p-8 shadow-2xl mt-10">
    <div class="text-center mb-8">
      <h1 class="font-title text-4xl font-bold text-white tracking-wider">
        HEILOG <span class="text-green-400 cursor-default select-none" ondblclick="abrirAdmin()">CONSULTA</span>
      </h1>
      <p class="text-gray-300 mt-2">Dados de Carregamento e Descarga</p>
      <div id="status" class="text-xs text-yellow-300 mt-2">Sincronizando base...</div>
    </div>

    <div class="space-y-4">
      <label class="block text-sm font-bold text-gray-400 uppercase tracking-wide">Buscar por DT ou Produto</label>
      <div class="flex gap-3">
        <input type="text" id="searchInput" class="form-input w-full p-4 rounded-xl text-lg" placeholder="Ex: 4500123456">
        <button id="searchBtn" class="btn-green px-8 rounded-xl text-lg transition-all hover:bg-green-700">Buscar</button>
      </div>
      
      <div class="mt-6 pt-5 border-t border-white/10">
        <button onclick="abrirMenuDescarga()" class="w-full bg-white/10 hover:bg-white/20 border border-white/20 text-white py-4 px-4 rounded-xl text-lg font-bold flex items-center justify-between transition-colors">
          <span>📦 Descarga Direta (Sem DT)</span>
          <span class="text-2xl">›</span>
        </button>
      </div>
    </div>

    <div id="results" class="mt-8 space-y-4"></div>
  </div>

  <script>
    // Coordenadas Exatas (Jacareí e Caçapava) para evitar erros do Maps
    const LINK_JACAREI = "https://www.google.com/maps?q=-23.2872,-45.9812";
    const LINK_CACAPAVA = "https://www.google.com/maps?q=-23.1393,-45.7523";

    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSHLJspPB5rUhpKWTUFGrtMeksd24eu1-I_l5S2qkhgFsie6cn1hITIUmr3k-ZuL4stm1x8MT0mC30s/pub?output=csv';
    let database = [];

    async function carregarPlanilha() {
      try {
        const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(CSV_URL)}&t=${Date.now()}`);
        const csvText = await response.text();
        const lines = csvText.trim().split(/\r?\n/);
        database = lines.slice(1).map(line => line.split(',').map(v => v.replace(/"/g, '').trim()));
        document.getElementById('status').textContent = 'Base Online';
        document.getElementById('status').className = 'text-xs text-green-400 mt-2 font-bold';
      } catch (e) {
        document.getElementById('status').textContent = 'Erro na conexão';
      }
    }

    function buscarDestino() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const container = document.getElementById('results');
      if (!q) return;
      const res = database.filter(row => row.some(c => c && c.toLowerCase().includes(q)));
      
      if (res.length === 0) {
        container.innerHTML = `<div class="p-4 bg-red-900/40 border border-red-500 rounded-xl text-red-200 uppercase font-bold text-center">Nenhuma DT localizada</div>`;
        return;
      }

      container.innerHTML = res.map(row => {
        const local = (row[6] || '').toUpperCase();
        const isJacarei = local.includes('FÁBRICA') || local.includes('JACAREÍ');
        const link = isJacarei ? LINK_JACAREI : LINK_CACAPAVA;
        const endereco = isJacarei ? '📍 Portaria Heineken Jacareí' : '📍 Portaria Lusitana Caçapava';

        return `
        <div class="bg-black/40 border border-white/10 rounded-xl p-5 space-y-4 animate-fade-in-up">
          <div class="flex justify-between items-start border-b border-white/10 pb-3">
            <div>
              <div class="text-xs text-gray-400 font-bold uppercase">Depósito de Destino</div>
              <div class="text-2xl font-black text-green-400">${row[6]}</div>
              <div class="address-box flex flex-col gap-2">
                <span class="text-sm text-gray-200">${endereco}</span>
                <a href="${link}" target="_blank" class="text-blue-400 hover:underline font-bold text-sm">Abrir Localização Exata no Maps</a>
              </div>
            </div>
            <div class="text-right">
              <div class="text-xs text-gray-400 font-bold uppercase">DT</div>
              <div class="text-xl font-bold">${row[0]}</div>
            </div>
          </div>
          
          <div class="grid grid-cols-2 gap-4">
            <div class="col-span-2"><div class="text-xs text-gray-400 uppercase">Cliente</div><div class="font-bold">${row[2]}</div></div>
            <div class="col-span-1"><div class="text-xs text-gray-400 uppercase">Quantidade</div><div class="text-lg font-bold text-green-300">${row[5]} Paletes</div></div>
            <div class="col-span-1"><div class="text-xs text-gray-400 uppercase">Data</div><div class="text-lg font-bold">${row[8]}</div></div>
            <div class="col-span-2 bg-white/5 p-3 rounded-lg"><div class="text-xs text-gray-400 uppercase">Horário de Agenda</div><div class="text-2xl font-black text-white">${row[11]}</div></div>
          </div>
        </div>`;
      }).join('');
    }

    document.getElementById('searchBtn').addEventListener('click', buscarDestino);
    window.onload = carregarPlanilha;
  </script>
</body>
</html>
