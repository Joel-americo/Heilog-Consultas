<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEILOG - Consulta de Carregamento</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --heineken-green: #00904A; --dark-bg: #174017; }
    body { font-family: 'Roboto', sans-serif; background-color: var(--dark-bg); color: #f3f4f6; }
    .font-title { font-family: 'Oswald', sans-serif; }
    .card { background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .form-input { background-color: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: white; }
    .btn-green { background-color: var(--heineken-green); color: white; font-weight: bold; }
    .address-box { background: rgba(255,255,255,0.05); border-left: 4px solid var(--heineken-green); padding: 12px; margin-top: 12px; border-radius: 4px; }
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: var(--heineken-green); border-radius: 10px; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
  </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center p-4 sm:p-8">

  <div class="w-full max-w-2xl card rounded-2xl p-6 sm:p-8 shadow-2xl mt-10 z-10">
    <div class="text-center mb-8">
      <h1 class="font-title text-4xl font-bold text-white tracking-wider">
        HEILOG <span class="text-green-400 cursor-default select-none" ondblclick="abrirAdmin()">CONSULTA</span>
      </h1>
      <p class="text-gray-300 mt-2">Saiba onde carregar ou descarregar</p>
      <div id="status" class="text-xs text-yellow-300 mt-2 font-bold uppercase">Sincronizando...</div>
    </div>

    <div class="space-y-4">
      <div class="flex gap-3">
        <input type="text" id="searchInput" class="form-input w-full p-4 rounded-xl text-lg outline-none" placeholder="Digite a DT ou Produto...">
        <button id="searchBtn" class="btn-green px-8 rounded-xl text-lg transition-all hover:bg-green-700">Buscar</button>
      </div>
      
      <div class="mt-6 pt-5 border-t border-white/10">
        <button onclick="abrirMenuDescarga()" class="w-full bg-white/10 hover:bg-white/20 border border-white/20 text-white py-4 px-4 rounded-xl text-lg font-bold flex items-center justify-between transition-colors">
          <span>📦 Descarga Direta (Sem DT)</span>
          <span class="text-2xl">›</span>
        </button>
      </div>
    </div>

    <div id="results" class="mt-8 space-y-4"></div>
  </div>

  <div id="adminModal" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex justify-center items-center p-4">
    <div class="bg-[#174017] border border-white/20 rounded-2xl p-6 w-full max-w-sm shadow-2xl flex flex-col max-h-[90vh]">
      <h2 class="text-white font-title text-2xl tracking-wider mb-2 border-b border-white/10 pb-2">⚙️ Ajustar Destinos</h2>
      <div id="adminSettingsList" class="flex-1 overflow-y-auto space-y-2 pr-2 custom-scroll mb-4"></div>
      <button onclick="salvarConfig()" class="btn-green w-full py-3 rounded-lg text-sm uppercase">Salvar Configurações</button>
      <button onclick="fecharAdmin()" class="mt-2 text-gray-400 text-xs uppercase">Cancelar</button>
    </div>
  </div>

  <div id="descargaModal" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex justify-center items-center p-4">
    <div class="bg-[#174017] border border-white/20 rounded-2xl p-6 w-full max-w-lg shadow-2xl flex flex-col max-h-[85vh]">
      <h2 class="text-white font-title text-2xl tracking-wider mb-4 border-b border-white/10 pb-2">Escolha o Item</h2>
      <div id="itensDescarga" class="grid grid-cols-1 sm:grid-cols-2 gap-2 overflow-y-auto custom-scroll pr-2"></div>
      <button onclick="fecharMenuDescarga()" class="mt-4 text-gray-400 text-xs uppercase">Voltar</button>
    </div>
  </div>

  <div id="helpBackdrop" class="hidden fixed inset-0 z-40 bg-black/40 backdrop-blur-sm" onclick="toggleHelpMenu()"></div>
  <div id="helpMenu" class="hidden fixed bottom-24 right-4 sm:right-8 bg-[#102d17] border border-white/20 rounded-2xl shadow-2xl p-4 w-72 z-50 transition-all">
    <h3 class="text-white font-title tracking-wider text-lg mb-3 border-b border-white/10 pb-2 uppercase">Opções de Contato</h3>
    <div class="space-y-3">
      <a href="https://wa.me/5512999999999?text=Olá%2C%20sou%20motorista%20e%20estou%20com%20uma%20dúvida%20no%20app%20HEILOG." target="_blank" class="flex items-center gap-3 bg-[#25D366] hover:bg-[#1da851] text-white p-3 rounded-xl shadow-lg transition-colors">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 21.036c-1.536 0-3.033-.414-4.35-1.198l-4.839 1.267 1.29-4.717c-.858-1.378-1.31-2.954-1.31-4.57 0-4.793 3.906-8.698 8.699-8.698 4.793 0 8.699 3.905 8.699 8.698 0 4.794-3.906 8.699-8.699 8.699h-.001c0 .001-.001.001-.002.001z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="font-bold text-sm">Chamar no WhatsApp</span>
      </a>
      <a href="tel:+551233334444" class="flex items-center gap-3 bg-white/10 hover:bg-white/20 border border-white/20 text-white p-3 rounded-xl transition-colors">
        <span class="text-xl">📞</span>
        <span class="font-bold text-sm">Ligar para a Logística</span>
      </a>
    </div>
  </div>

  <div class="fixed bottom-6 right-4 sm:right-8 z-50">
    <button onclick="toggleHelpMenu()" class="bg-[#E50025] hover:bg-[#c6001f] text-white rounded-full p-4 shadow-lg flex items-center gap-2 transition-transform hover:scale-105 border-2 border-[#174017]">
      <span class="text-2xl">💬</span>
      <span class="font-bold hidden sm:inline tracking-wider uppercase">Precisa de Ajuda?</span>
    </button>
  </div>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSHLJspPB5rUhpKWTUFGrtMeksd24eu1-I_l5S2qkhgFsie6cn1hITIUmr3k-ZuL4stm1x8MT0mC30s/pub?output=csv';
    
    // LINKS DIRETOS DO GOOGLE MAPS (Raiz/Inquebráveis)
    const LINK_JACAREI = "https://www.google.com/maps/search/?api=1&query=Heineken+Cervejaria+Jacareí+Av+Pres+Humberto+Castelo+Branco+2911";
    const LINK_CACAPAVA = "https://www.google.com/maps/search/?api=1&query=Rua+Vereador+Geraldo+Nogueira+da+Silva+5111+Cacapava+SP";

    const itens = ["Insumo", "Caixa Verde", "Caixa Amarela", "Barril 50L", "Barril 30L", "Paletes PBR1", "Paletes PBR2", "Garrafa 250ml", "Garrafa 330 (Praya)", "Garrafa 330 (Heineken)", "Garrafa 600"];
    let database = [];

    async function carregarPlanilha() {
      const status = document.getElementById('status');
      try {
        const response = await fetch(`${CSV_URL}&t=${Date.now()}`);
        const csvText = await response.text();
        const lines = csvText.trim().split(/\r?\n/);
        database = lines.slice(1).map(line => {
          const regex = /("([^"]|"")*"|[^,]*)(,|$)/g;
          return line.match(regex).map(m => m.replace(/,$/, '').replace(/"/g, '').trim());
        });
        status.textContent = 'Base Sincronizada';
        status.className = 'text-xs text-green-400 mt-2 font-bold';
      } catch (e) {
        status.textContent = 'Erro ao conectar';
      }
    }

    function abrirAdmin() {
      const list = document.getElementById('adminSettingsList');
      list.innerHTML = itens.map((item, i) => {
        const salvo = localStorage.getItem('dest_' + item) || 'FÁBRICA';
        return `<div class="bg-black/20 p-2 rounded-lg"><label class="text-[10px] text-gray-400 uppercase">${item}</label><select id="adm_${i}" class="form-input w-full p-1 rounded text-sm"><option value="FÁBRICA" ${salvo === 'FÁBRICA' ? 'selected' : ''}>📍 FÁBRICA</option><option value="LUSITANA" ${salvo === 'LUSITANA' ? 'selected' : ''}>📍 LUSITANA</option></select></div>`;
      }).join('');
      document.getElementById('adminModal').classList.remove('hidden');
    }

    function fecharAdmin() { document.getElementById('adminModal').classList.add('hidden'); }
    function salvarConfig() {
      itens.forEach((item, i) => localStorage.setItem('dest_' + item, document.getElementById('adm_'+i).value));
      fecharAdmin();
      alert('Configurações salvas!');
    }

    function abrirMenuDescarga() {
      const list = document.getElementById('itensDescarga');
      list.innerHTML = itens.map(item => `<button onclick="selecionarDescarga('${item}')" class="bg-white/10 p-3 rounded-lg text-left text-sm hover:bg-white/20 transition-all font-bold">${item}</button>`).join('');
      document.getElementById('descargaModal').classList.remove('hidden');
    }
    function fecharMenuDescarga() { document.getElementById('descargaModal').classList.add('hidden'); }

    function selecionarDescarga(item) {
      fecharMenuDescarga();
      const dest = localStorage.getItem('dest_' + item) || 'FÁBRICA';
      const isJacarei = dest === 'FÁBRICA';
      exibirResultado(item, "Direta", "Sem DT", "---", isJacarei, "---", "---");
    }

    function buscarDestino() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!q) return;
      const res = database.filter(row => row.some(c => c && c.toLowerCase().includes(q)));
      const container = document.getElementById('results');
      if (res.length === 0) {
        container.innerHTML = `<div class="p-4 bg-red-900/40 border border-red-500 rounded-xl text-red-200 text-center">DT não encontrada</div>`;
        return;
      }
      container.innerHTML = res.map(row => {
        const isJacarei = (row[6] || '').toUpperCase().includes('FÁBRICA');
        return exibirCardHTML(row[4], row[2], row[0], row[5], isJacarei, row[8], row[11]);
      }).join('');
    }

    function exibirResultado(nome, cliente, dt, plt, isJacarei, data, agenda) {
      document.getElementById('results').innerHTML = exibirCardHTML(nome, cliente, dt, plt, isJacarei, data, agenda);
    }

    function exibirCardHTML(nome, cliente, dt, plt, isJacarei, data, agenda) {
      const link = isJacarei ? LINK_JACAREI : LINK_CACAPAVA;
      const local = isJacarei ? 'FÁBRICA (JACAREÍ)' : 'LUSITANA (CAÇAPAVA)';
      const end = isJacarei ? 'Av. Pres. Humberto de Alencar Castelo Branco, 2911' : 'Rua Vereador Geraldo Nogueira da Silva, 5111';
      return `<div class="bg-black/50 border border-white/10 rounded-xl p-5 space-y-4 animate-fade-in-up shadow-2xl">
        <div class="flex justify-between items-start border-b border-white/10 pb-3">
          <div><div class="text-[10px] text-gray-400 uppercase font-bold">Destino</div><div class="text-xl font-black text-green-400">${local}</div>
          <div class="address-box text-xs text-gray-300"><span>${end}</span><br><a href="${link}" target="_blank" class="text-blue-400 font-bold underline hover:text-blue-300">ABRIR NO GOOGLE MAPS</a></div></div>
          <div class="text-right"><div class="text-[10px] text-gray-400 uppercase font-bold">DT</div><div class="text-lg font-bold text-white">${dt}</div></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div class="col-span-2"><div class="text-[10px] text-gray-400 uppercase">Cliente / Produto</div><div class="font-bold text-gray-200 text-sm">${cliente} / ${nome}</div></div>
          <div class="col-span-1"><div class="text-[10px] text-gray-400 uppercase">Quantidade</div><div class="text-lg font-black text-white">${plt} PLTS</div></div>
          <div class="col-span-1 text-right"><div class="text-[10px] text-gray-400 uppercase">Data</div><div class="text-lg font-bold text-gray-200">${data}</div></div>
          <div class="col-span-2 bg-green-900/20 p-3 rounded-lg border border-green-500/30 text-center"><div class="text-[10px] text-green-400 uppercase font-bold">Horário de Agenda</div><div class="text-2xl font-black text-white">${agenda}</div></div>
        </div>
      </div>`;
    }

    function toggleHelpMenu() {
      const menu = document.getElementById('helpMenu');
      const backdrop = document.getElementById('helpBackdrop');
      menu.classList.toggle('hidden'); backdrop.classList.toggle('hidden');
    }

    document.getElementById('searchBtn').onclick = buscarDestino;
    document.getElementById('searchInput').onkeypress = (e) => { if (e.key === 'Enter') buscarDestino(); };
    window.onload = carregarPlanilha;
  </script>
</body>
</html>
