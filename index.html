<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEILOG - Consulta Rápida de Carregamento</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --heineken-green: #00904A;
      --dark-bg: #174017;
    }
    body { font-family: 'Roboto', sans-serif; background-color: var(--dark-bg); color: #f3f4f6; }
    .font-title { font-family: 'Oswald', sans-serif; }
    .card { background-color: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .form-input { background-color: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: white; }
    .form-input:focus { border-color: var(--heineken-green); box-shadow: 0 0 0 2px rgba(0, 144, 74, 0.5); outline: none; }
    .btn-green { background-color: var(--heineken-green); color: white; font-weight: bold; }
    .btn-green:hover { background-color: #007a3f; }
    .address-box { background: rgba(255,255,255,0.05); border-left: 4px solid var(--heineken-green); padding: 12px; margin-top: 12px; border-radius: 4px; }
    
    /* Scrollbar estilizada */
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
    .custom-scroll::-webkit-scrollbar-thumb:hover { background: var(--heineken-green); }
  </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center p-4 sm:p-8 relative">

  <div class="w-full max-w-2xl card rounded-2xl p-6 sm:p-8 shadow-2xl mt-10 z-10">
    <div class="text-center mb-8">
      <h1 class="font-title text-4xl font-bold text-white tracking-wider">
        HEILOG <span class="text-green-400 cursor-default select-none" ondblclick="abrirAdmin()">CONSULTA</span>
      </h1>
      <p class="text-gray-300 mt-2">Saiba onde carregar/descarregar</p>
      <div id="status" class="text-xs text-yellow-300 mt-2">Conectando à base de dados...</div>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-bold text-gray-400 mb-2 uppercase tracking-wide">Buscar pela Planilha</label>
        <div class="flex gap-3">
          <input type="text" id="searchInput" class="form-input w-full p-4 rounded-xl text-lg" placeholder="Digite a DT, Produto ou Descrição...">
          <button id="searchBtn" class="btn-green px-8 rounded-xl text-lg transition-all">Buscar</button>
        </div>
        
        <div class="mt-6 pt-5 border-t border-white/10">
          <label class="block text-sm font-bold text-gray-400 mb-2 uppercase tracking-wide">Operações Diretas (Sem DT)</label>
          <button onclick="abrirMenuDescarga()" class="w-full bg-white/10 hover:bg-white/20 border border-white/20 text-white py-4 px-4 rounded-xl text-lg font-bold transition-colors flex items-center justify-between shadow-lg">
            <span class="flex items-center gap-2">📦 Escolher opção de Descarga</span>
            <span class="text-2xl leading-none">›</span>
          </button>
        </div>

      </div>
    </div>

    <div id="results" class="mt-8 space-y-4">
      </div>
  </div>

  <div id="descargaModal" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex justify-center items-end sm:items-center p-4 transition-all">
    <div class="bg-[#174017] border border-white/20 rounded-2xl p-6 w-full max-w-lg shadow-2xl flex flex-col max-h-[85vh] animate-fade-in-up">
      <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-3">
        <h2 class="text-white font-title text-2xl tracking-wider">📦 Descarga Direta</h2>
        <button onclick="fecharMenuDescarga()" class="text-gray-400 hover:text-white text-3xl leading-none">&times;</button>
      </div>
      
      <div class="flex-1 overflow-y-auto space-y-5 pr-2 custom-scroll mb-2">
        <div>
          <div class="text-xs text-gray-400 uppercase font-bold mb-2">Matéria-Prima</div>
          <button onclick="selecionarDescarga('Insumo')" class="w-full text-left bg-white/10 hover:bg-white/20 border border-white/20 text-white py-3 px-4 rounded-xl text-sm font-bold transition-colors">
            🧪 Descarga de Insumo
          </button>
        </div>

        <div>
          <div class="text-xs text-gray-400 uppercase font-bold mb-2">Devoluções / Vasilhames</div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
            <button onclick="selecionarDescarga('Caixa Verde')" class="text-left bg-white/10 hover:bg-white/20 border border-white/20 text-white py-3 px-4 rounded-xl text-sm font-bold transition-colors">📦 Caixa Verde</button>
            <button onclick="selecionarDescarga('Caixa Amarela')" class="text-left bg-white/10 hover:bg-white/20 border border-white/20 text-white py-3 px-4 rounded-xl text-sm font-bold transition-colors">📦 Caixa Amarela</button>
            
            <button onclick="selecionarDescarga('Barril 50L')" class="text-left bg-white/10 hover:bg-white/20 border border-white/20 text-white py-3 px-4 rounded-xl text-sm font-bold transition-colors">🛢️ Barril 50L</button>
            <button onclick="selecionarDescarga('Barril 30L')" class="text-left bg-white/10 hover:bg-white/20 border border-white/20 text-white py-3 px-4 rounded-xl text-sm font-bold transition-colors">🛢️ Barril 30L</button>
            
            <button onclick="selecionarDescarga('Paletes PBR1')" class="text-left bg-white/10 hover:bg-white/20 border border-white/20 text-white py-3 px-4 rounded-xl text-sm font-bold transition-colors">🟫 Paletes PBR1</button>
            <button onclick="selecionarDescarga('Paletes PBR2')" class="text-left bg-white/10 hover:bg-white/20 border border-white/20 text-white py-3 px-4 rounded-xl text-sm font-bold transition-colors">🟫 Paletes PBR2</button>
            
            <button onclick="selecionarDescarga('Garrafa 250ml')" class="text-left bg-white/10 hover:bg-white/20 border border-white/20 text-white py-3 px-4 rounded-xl text-sm font-bold transition-colors">🍾 Garrafa 250ml</button>
            <button onclick="selecionarDescarga('Garrafa 330 (Praya - Transparente)')" class="text-left bg-white/10 hover:bg-white/20 border border-white/20 text-white py-3 px-4 rounded-xl text-sm font-bold transition-colors">🍾 Garrafa 330 (Praya)</button>
            <button onclick="selecionarDescarga('Garrafa 330 (Heineken)')" class="text-left bg-white/10 hover:bg-white/20 border border-white/20 text-white py-3 px-4 rounded-xl text-sm font-bold transition-colors">🍾 Garrafa 330 (Heineken)</button>
            <button onclick="selecionarDescarga('Garrafa 600')" class="text-left bg-white/10 hover:bg-white/20 border border-white/20 text-white py-3 px-4 rounded-xl text-sm font-bold transition-colors">🍾 Garrafa 600</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="adminModal" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex justify-center items-center p-4 transition-all">
    <div class="bg-[#174017] border border-white/20 rounded-2xl p-6 w-full max-w-sm shadow-2xl flex flex-col max-h-[90vh]">
      <div class="flex justify-between items-center mb-2 border-b border-white/10 pb-2">
        <h2 class="text-white font-title text-2xl tracking-wider">⚙️ Configurações</h2>
      </div>
      <p class="text-sm text-gray-300 mb-4 mt-2">Defina o destino de descarregamento de cada item.</p>
      
      <div id="adminSettingsList" class="flex-1 overflow-y-auto space-y-2 pr-2 custom-scroll mb-4"></div>
      
      <div class="flex gap-2 pt-2 border-t border-white/10 mt-auto">
        <button onclick="salvarConfig()" class="btn-green flex-1 py-3 rounded-lg text-sm uppercase">Salvar</button>
        <button onclick="fecharAdmin()" class="bg-gray-600 hover:bg-gray-500 text-white flex-1 py-3 rounded-lg font-bold text-sm uppercase transition-colors">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="helpBackdrop" class="hidden fixed inset-0 z-40 bg-black/40 backdrop-blur-sm transition-all" onclick="toggleHelpMenu()"></div>

  <div id="helpMenu" class="hidden fixed bottom-24 right-4 sm:right-8 bg-[#102d17] border border-white/20 rounded-2xl shadow-2xl p-4 w-72 z-50 transform transition-all">
    <h3 class="text-white font-title tracking-wider text-lg mb-3 border-b border-white/10 pb-2">OPÇÕES DE CONTATO</h3>
    <div class="space-y-3">
      <a href="https://wa.me/5512999999999?text=Ol%C3%A1%2C%20sou%20motorista%20e%20estou%20com%20uma%20d%C3%BAvida%20no%20app%20HEILOG." target="_blank" 
         class="flex items-center gap-3 bg-[#25D366] hover:bg-[#1da851] text-white p-3 rounded-xl transition-colors shadow-lg">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 21.036c-1.536 0-3.033-.414-4.35-1.198l-4.839 1.267 1.29-4.717c-.858-1.378-1.31-2.954-1.31-4.57 0-4.793 3.906-8.698 8.699-8.698 4.793 0 8.699 3.905 8.699 8.698 0 4.794-3.906 8.699-8.699 8.699h-.001c0 .001-.001.001-.002.001z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="font-bold text-sm">Chamar no WhatsApp</span>
      </a>
      <a href="tel:+551233334444" 
         class="flex items-center gap-3 bg-white/10 hover:bg-white/20 border border-white/20 text-white p-3 rounded-xl transition-colors">
        <span class="text-xl">📞</span>
        <span class="font-bold text-sm">Ligar para a Logística</span>
      </a>
    </div>
  </div>

  <div class="fixed bottom-6 right-4 sm:right-8 z-50">
    <button id="helpBtn" onclick="toggleHelpMenu()" class="bg-[#E50025] hover:bg-[#c6001f] text-white rounded-full p-4 shadow-[0_10px_25px_rgba(229,0,37,0.4)] flex items-center gap-2 transition-transform transform hover:scale-105 border-2 border-[#174017]">
      <span class="text-2xl">💬</span>
      <span class="font-bold hidden sm:inline tracking-wider">PRECISA DE AJUDA?</span>
    </button>
  </div>

  <script>
    // --- LISTA CENTRAL DE OPERAÇÕES INDIRETAS ---
    const operacoesConfiguraveis = [
      { id: 'Insumo', nome: '🧪 Insumo' },
      { id: 'Caixa Verde', nome: '📦 Caixa Verde' },
      { id: 'Caixa Amarela', nome: '📦 Caixa Amarela' },
      { id: 'Barril 50L', nome: '🛢️ Barril 50L' },
      { id: 'Barril 30L', nome: '🛢️ Barril 30L' },
      { id: 'Paletes PBR1', nome: '🟫 Paletes PBR1' },
      { id: 'Paletes PBR2', nome: '🟫 Paletes PBR2' },
      { id: 'Garrafa 250ml', nome: '🍾 Garrafa 250ml' },
      { id: 'Garrafa 330 (Praya - Transparente)', nome: '🍾 Garrafa 330 (Praya)' },
      { id: 'Garrafa 330 (Heineken)', nome: '🍾 Garrafa 330 (Heineken)' },
      { id: 'Garrafa 600', nome: '🍾 Garrafa 600' }
    ];

    // --- Lógica Modal Descarga ---
    function abrirMenuDescarga() {
      document.getElementById('descargaModal').classList.remove('hidden');
    }

    function fecharMenuDescarga() {
      document.getElementById('descargaModal').classList.add('hidden');
    }

    function selecionarDescarga(tipo) {
      fecharMenuDescarga();
      mostrarOperacaoDireta(tipo);
    }

    // --- Lógica de Configuração Interna (Admin) ---
    function abrirAdmin() {
      const container = document.getElementById('adminSettingsList');
      container.innerHTML = operacoesConfiguraveis.map((op, index) => {
        const destinoSalvo = localStorage.getItem('destino_' + op.id) || 'FÁBRICA'; 
        return `
          <div class="bg-black/20 p-2.5 rounded-lg border border-white/5">
            <label class="block text-[11px] text-gray-300 uppercase font-bold mb-1">${op.nome}</label>
            <select id="config_sel_${index}" class="form-input w-full p-2 rounded-lg text-white bg-black/40 border border-white/20 text-sm font-bold">
              <option value="FÁBRICA" ${destinoSalvo === 'FÁBRICA' ? 'selected' : ''}>📍 FÁBRICA</option>
              <option value="LUSITANA" ${destinoSalvo === 'LUSITANA' ? 'selected' : ''}>📍 LUSITANA</option>
            </select>
          </div>
        `;
      }).join('');
      document.getElementById('adminModal').classList.remove('hidden');
    }

    function fecharAdmin() {
      document.getElementById('adminModal').classList.add('hidden');
    }

    function salvarConfig() {
      operacoesConfiguraveis.forEach((op, index) => {
        const valorSelecionado = document.getElementById('config_sel_' + index).value;
        localStorage.setItem('destino_' + op.id, valorSelecionado);
      });
      fecharAdmin();
      document.getElementById('results').innerHTML = '';
      document.getElementById('searchInput').value = '';
    }

    // --- Lógica do Menu Flutuante ---
    function toggleHelpMenu() {
      const menu = document.getElementById('helpMenu');
      const backdrop = document.getElementById('helpBackdrop');
      if (menu.classList.contains('hidden')) {
        menu.classList.remove('hidden');
        backdrop.classList.remove('hidden');
      } else {
        menu.classList.add('hidden');
        backdrop.classList.add('hidden');
      }
    }

    // --- Lógica da Planilha e Busca ---
    const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSHLJspPB5rUhpKWTUFGrtMeksd24eu1-I_l5S2qkhgFsie6cn1hITIUmr3k-ZuL4stm1x8MT0mC30s/pub?output=csv';
    const proxies = [
      (url) => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(url)}`,
      (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      (url) => url 
    ];
    let database = [];

    async function carregarPlanilha() {
      const statusEl = document.getElementById('status');
      const targetUrl = `${GOOGLE_SHEET_CSV_URL}&t=${Date.now()}`;
      let sucesso = false;

      for (const proxyBuilder of proxies) {
        try {
          const url = proxyBuilder(targetUrl);
          const response = await fetch(url);
          if (!response.ok) throw new Error(`Falha HTTP: ${response.status}`);
          const csvText = await response.text();
          if (csvText.includes('<html') && !csvText.includes('DTS')) throw new Error('Bloqueio HTML');
          processarCSV(csvText);
          statusEl.textContent = `Base atualizada! (${database.length} registros carregados)`;
          statusEl.className = 'text-xs text-green-400 mt-2 font-bold';
          sucesso = true;
          break; 
        } catch (error) {
          console.warn('Tentando próximo proxy...');
        }
      }

      if (!sucesso) {
        statusEl.textContent = 'Erro ao carregar a planilha. Tente recarregar a página.';
        statusEl.className = 'text-xs text-red-400 mt-2 font-bold';
      }
    }

    function processarCSV(csvText) {
      const textoLimpo = csvText.replace(/^\uFEFF/, '').trim();
      const lines = textoLimpo.split(/\r?\n/);
      if (lines.length < 2) return;

      const parseLine = (line) => {
        const values = [];
        const regex = /("([^"]|"")*"|[^,]*)(,|$)/g;
        line.replace(regex, (match, p1) => {
          let value = p1;
          if (value.startsWith('"') && value.endsWith('"')) value = value.slice(1, -1).replace(/""/g, '"');
          values.push(value.trim()); 
        });
        return values;
      };
      
      database = lines.slice(1).map(line => {
        if (line.trim() === '') return null;
        return parseLine(line);
      }).filter(Boolean);
    }

    // --- Identificador de Ícones ---
    function getIcone(tipo) {
      const t = tipo.toLowerCase();
      if (t.includes('insumo')) return '🧪';
      if (t.includes('caixa')) return '📦';
      if (t.includes('barril')) return '🛢️';
      if (t.includes('palete')) return '🟫';
      if (t.includes('garrafa')) return '🍾';
      return '🔄';
    }

    // --- Operações Diretas (Sem Planilha) ---
    function mostrarOperacaoDireta(tipo) {
      const resultsContainer = document.getElementById('results');
      document.getElementById('searchInput').value = ''; 
      
      let tituloOp = `Descarga de ${tipo}`;
      let iconeOp = getIcone(tipo);
      
      const destinoSalvo = localStorage.getItem('destino_' + tipo) || 'FÁBRICA';
      
      let depositoFinal = '';
      let enderecoFinal = '';
      let mapsLinkFinal = '';

      if (destinoSalvo === 'LUSITANA') {
        depositoFinal = 'LUSITANA (CAÇAPAVA)';
        enderecoFinal = '📍 Rua Vereador Geraldo Nogueira da Silva, 5111 - Caçapava, SP, 12280-001';
        mapsLinkFinal = 'https://maps.app.goo.gl/wR9J8xY1XkY7cZQz9';
      } else {
        depositoFinal = 'FÁBRICA (JACAREÍ)';
        enderecoFinal = '📍 Av. Presidente Humberto de Alencar Castelo Branco, 2911 - Rio Abaixo, Jacareí - SP, 12321-150';
        mapsLinkFinal = 'https://maps.app.goo.gl/3QyRkPqQeHj5Vz7aA';
      }

      resultsContainer.innerHTML = `
        <div class="bg-blue-900/30 border border-blue-500/50 rounded-xl p-5 space-y-4 shadow-xl animate-fade-in-up">
          <div class="flex justify-between items-start border-b border-blue-500/30 pb-3">
            <div class="flex-1 pr-4">
              <div class="text-xs text-blue-300 font-bold uppercase">Operação Direta</div>
              <div class="text-2xl font-black text-white">${depositoFinal}</div>
              
              <div class="address-box border-blue-500 flex flex-col gap-2">
                <span class="text-sm text-gray-200">${enderecoFinal}</span>
                <a href="${mapsLinkFinal}" target="_blank" class="inline-flex items-center gap-1.5 text-blue-400 hover:text-blue-300 font-bold text-sm w-fit transition-colors">
                  <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                  Abrir no Google Maps
                </a>
              </div>
            </div>
            <div class="text-right">
              <div class="text-xs text-blue-300 font-bold uppercase">DTS</div>
              <div class="text-xl font-bold text-white">Sem DT</div>
            </div>
          </div>
          
          <div class="pt-2">
            <div class="text-xs text-blue-300 uppercase mb-1">Item a ser Descarregado</div>
            <div class="font-semibold text-white text-lg">${iconeOp} ${tituloOp}</div>
            <p class="text-sm text-blue-200 mt-2">Siga as orientações para o endereço informado acima. Não é necessário inserir DT.</p>
          </div>
        </div>
      `;
    }

    function buscarDestino() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      const resultsContainer = document.getElementById('results');
      
      if (!query) {
        resultsContainer.innerHTML = '<p class="text-yellow-400">Por favor, digite uma DT ou valor para buscar.</p>';
        return;
      }

      // Atalhos
      const atalhosExatos = {
        'insumo': 'Insumo',
        'caixa verde': 'Caixa Verde',
        'caixa amarela': 'Caixa Amarela',
        'barril 50l': 'Barril 50L',
        'barril 30l': 'Barril 30L',
        'paletes pbr1': 'Paletes PBR1', 'palete pbr1': 'Paletes PBR1',
        'paletes pbr2': 'Paletes PBR2', 'palete pbr2': 'Paletes PBR2',
        'garrafa 250ml': 'Garrafa 250ml',
        'garrafa 330 praya': 'Garrafa 330 (Praya - Transparente)',
        'praya': 'Garrafa 330 (Praya - Transparente)',
        'garrafa 330 heineken': 'Garrafa 330 (Heineken)',
        'heineken 330': 'Garrafa 330 (Heineken)',
        'garrafa 600': 'Garrafa 600'
      };

      if (atalhosExatos[query]) {
        mostrarOperacaoDireta(atalhosExatos[query]);
        return;
      }

      const resultados = database.filter(row => {
        return row.some(cell => cell && cell.toLowerCase().includes(query));
      });

      if (resultados.length === 0) {
        resultsContainer.innerHTML = `<div class="p-4 bg-red-900/40 border border-red-500 rounded-xl text-red-200 animate-fade-in-up">Nenhuma operação encontrada para "<b>${query}</b>".</div>`;
        return;
      }

      resultsContainer.innerHTML = resultados.map(row => {
        const dt             = row[0] || 'N/A';
        const canal          = row[1] || 'N/A';
        const cliente        = row[2] || 'N/A';
        const produto        = row[3] || 'N/A';
        const descricaoE     = row[4] || 'N/A';
        const plt            = row[5] || '0';
        const deposito       = row[6] || 'N/A';
        const transportadora = row[7] || 'N/A';
        
        let endereco = '';
        let mapsLink = '';
        const dep = deposito.toUpperCase();
        
        if (dep.includes('FÁBRICA') || dep.includes('FABRICA')) {
          endereco = '📍 Av. Presidente Humberto de Alencar Castelo Branco, 2911 - Rio Abaixo, Jacareí - SP, 12321-150';
          mapsLink = 'https://maps.app.goo.gl/3QyRkPqQeHj5Vz7aA'; 
        } else if (dep.includes('LUSITANA') || dep.includes('HEILO')) {
          endereco = '📍 Rua Vereador Geraldo Nogueira da Silva, 5111 - Caçapava, SP, 12280-001';
          mapsLink = 'https://maps.app.goo.gl/wR9J8xY1XkY7cZQz9'; 
        }
        
        return `
          <div class="bg-black/40 border border-white/10 rounded-xl p-5 space-y-4 shadow-lg animate-fade-in-up">
            <div class="flex justify-between items-start border-b border-white/10 pb-3">
              <div class="flex-1 pr-4">
                <div class="text-xs text-gray-400 font-bold uppercase">Local (Depósito)</div>
                <div class="text-2xl font-black text-green-400">${deposito}</div>
                ${endereco ? `
                  <div class="address-box flex flex-col gap-2">
                    <span class="text-sm text-gray-200">${endereco}</span>
                    <a href="${mapsLink}" target="_blank" class="inline-flex items-center gap-1.5 text-blue-400 hover:text-blue-300 font-bold text-sm w-fit transition-colors">
                      <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                      Abrir no Google Maps
                    </a>
                  </div>
                ` : ''}
              </div>
              <div class="text-right">
                <div class="text-xs text-gray-400 font-bold uppercase">DTS</div>
                <div class="text-xl font-bold">${dt}</div>
              </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 pt-2">
              <div class="col-span-2 sm:col-span-1">
                <div class="text-xs text-gray-400 uppercase">Cliente</div>
                <div class="font-semibold text-gray-100 truncate" title="${cliente}">${cliente}</div>
              </div>
              <div class="col-span-2 sm:col-span-1">
                <div class="text-xs text-gray-400 uppercase">Transportadora</div>
                <div class="font-semibold text-gray-100 truncate" title="${transportadora}">${transportadora}</div>
              </div>
              
              <div class="col-span-2">
                <div class="text-xs text-gray-400 uppercase">Descrição (Produto ${produto})</div>
                <div class="font-semibold text-gray-100">${descricaoE}</div>
              </div>

              <div>
                <div class="text-xs text-gray-400 uppercase">Canal</div>
                <div class="font-semibold text-gray-100">${canal}</div>
              </div>
              <div>
                <div class="text-xs text-gray-400 uppercase">Quantidade (PLT)</div>
                <div class="font-semibold text-gray-100">${plt}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    document.getElementById('searchBtn').addEventListener('click', buscarDestino);
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') buscarDestino();
    });

    window.onload = carregarPlanilha;
  </script>
</body>
</html>
